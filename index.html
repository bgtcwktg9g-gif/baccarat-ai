<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百家樂AI 終極版</title>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

h1{margin-top:20px;}

.ai{color:#38bdf8;margin:10px;}
.result{font-size:70px;margin:10px;}
.percent{font-size:22px;color:#22c55e;}
.tip{color:#facc15;margin-top:10px;}

button{
  padding:12px 30px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.road{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:15px;
}

.dot{
  width:16px;
  height:16px;
  border-radius:50%;
  margin:2px;
}

.b{background:red;}
.p{background:blue;}
.t{background:green;}
</style>
</head>

<body>

<h1>🎰 百家樂AI 頂級版</h1>

<div class="ai" id="ai">AI分析中...</div>
<div class="result" id="result">--</div>
<div class="percent" id="percent">計算中...</div>
<div class="tip" id="tip">分析市場數據...</div>

<button onclick="predict()">立即預測</button>
<button onclick="toggleAuto()">背景模式</button>

<div class="road" id="road"></div>

<script>
let history=[];
let auto=false;
let winStreak=0;

// ===== AI分析邏輯 =====
function analyze(){
  let last=history.slice(0,6);

  let b=last.filter(x=>x=="b").length;
  let p=last.filter(x=>x=="p").length;

  // 連莊判斷
  if(last[0]=="b" && last[1]=="b") return "b";
  if(last[0]=="p" && last[1]=="p") return "p";

  // 趨勢判斷
  if(b>p) return "b";
  if(p>b) return "p";

  return Math.random()<0.5?"b":"p";
}

// ===== 預測 =====
function predict(){
  document.getElementById("ai").innerText="AI分析中...";
  document.getElementById("result").innerText="...";
  document.getElementById("percent").innerText="計算中...";
  document.getElementById("tip").innerText="掃描牌局...";

  setTimeout(()=>{
    let res=analyze();
    let text="";
    let percent=(Math.random()*10+88).toFixed(1);

    if(res=="b") text="莊";
    else text="閒";

    // 和局機率
    if(Math.random()<0.07){
      text="和";
      res="t";
      percent=(Math.random()*10+75).toFixed(1);
    }

    // 勝率連勝演算法（視覺效果）
    if(history[0]==res) winStreak++;
    else winStreak=1;

    history.unshift(res);
    if(history.length>50) history.pop();

    document.getElementById("ai").innerText="AI分析完成";
    document.getElementById("result").innerText=text;
    document.getElementById("percent").innerText="勝率："+percent+"%";

    // 提示語
    let tip="";
    if(winStreak>=3) tip="🔥 連勝趨勢強烈，建議跟進";
    else if(res=="b") tip="莊勢偏強，資金流入";
    else if(res=="p") tip="閒路穩定，可觀察延續";
    else tip="和局干擾，暫停觀察";

    document.getElementById("tip").innerText=tip;

    render();
  },1200);
}

// ===== 路單 =====
function render(){
  let r=document.getElementById("road");
  r.innerHTML="";
  history.forEach(c=>{
    let d=document.createElement("div");
    d.className="dot "+c;
    r.appendChild(d);
  });
}

// ===== 背景模式 =====
function toggleAuto(){
  auto=!auto;
  if(auto){
    setInterval(predict,7000);
  }
}

// 初始
predict();
</script>

</body>
</html>
